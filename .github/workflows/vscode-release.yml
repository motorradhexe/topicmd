name: Package & release VS Code extension

# Publishes a GitHub Release with the packaged .vsix attached (installable via
# "Install from VSIX"). Two ways to trigger it — both entirely from GitHub:
#   1. Actions tab → "Run workflow" (workflow_dispatch). The release is tagged
#      vscode-v<version> from packages/vscode/package.json, created at the chosen
#      branch's HEAD. (The "Run workflow" button appears once this file is on the
#      default branch.)
#   2. Push a vscode-v* tag — e.g. by publishing a release from the Releases UI
#      with a new tag like vscode-v0.1.0.
#
# This does NOT publish to the VS Code Marketplace — that needs a publisher
# account and a VSCE_PAT secret. To enable it later, add a step:
#   - run: pnpm --filter topicmd-vscode exec vsce publish --no-dependencies
#     env: { VSCE_PAT: ${{ secrets.VSCE_PAT }} }

on:
  workflow_dispatch:
  push:
    tags:
      - 'vscode-v*'

permissions:
  contents: write # needed to create a GitHub Release

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        # No --ignore-scripts: esbuild needs its build step to bundle the
        # extension. pnpm-workspace.yaml allows esbuild and skips vsce's
        # publish-only native deps (keytar, vsce-sign).
        run: pnpm install --frozen-lockfile

      - name: Build core (project references)
        run: pnpm build

      - name: Package extension (.vsix)
        run: pnpm --filter topicmd-vscode package

      - name: Resolve version
        id: meta
        run: |
          V=$(node -p "require('./packages/vscode/package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=vscode-v$V" >> "$GITHUB_OUTPUT"

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: topicmd-vscode-vsix
          path: packages/vscode/*.vsix
          if-no-files-found: error

      - name: Publish GitHub Release with the .vsix
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: topicmd VS Code extension ${{ steps.meta.outputs.version }}
          files: packages/vscode/*.vsix
          generate_release_notes: true
