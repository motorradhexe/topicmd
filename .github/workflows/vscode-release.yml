name: Package & release VS Code extension

# On a vscode-v* tag: build, package the .vsix, and publish a GitHub Release with
# the .vsix attached (installable via "Install from VSIX"). On manual dispatch:
# build and upload the .vsix as a workflow artifact only.
#
# This does NOT publish to the VS Code Marketplace — that needs a publisher
# account and a VSCE_PAT secret. To enable it later, add a step:
#   - run: pnpm --filter topicmd-vscode exec vsce publish --no-dependencies
#     env: { VSCE_PAT: ${{ secrets.VSCE_PAT }} }

on:
  workflow_dispatch:
  push:
    tags:
      - 'vscode-v*'

permissions:
  contents: write # needed to create a GitHub Release

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        # No --ignore-scripts: esbuild needs its build step to bundle the
        # extension. pnpm-workspace.yaml allows esbuild and skips vsce's
        # publish-only native deps (keytar, vsce-sign).
        run: pnpm install --frozen-lockfile

      - name: Build core (project references)
        run: pnpm build

      - name: Package extension (.vsix)
        run: pnpm --filter topicmd-vscode package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: topicmd-vscode-vsix
          path: packages/vscode/*.vsix
          if-no-files-found: error

      - name: Publish GitHub Release with the .vsix
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/vscode/*.vsix
          generate_release_notes: true
