name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # --ignore-scripts: skip dependency build scripts (esbuild's postinstall).
        # pnpm errors (ERR_PNPM_IGNORED_BUILDS) on unapproved builds; CI doesn't
        # need them — vitest/esbuild work via the @esbuild/* binary packages.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck (and build)
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Validate example project
        run: >-
          node packages/cli/dist/index.js validate
          --schema examples/basic/docs.schema.yaml
          --root examples/basic
          --content examples/basic/docs
