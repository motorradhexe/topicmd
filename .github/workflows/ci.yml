name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        shell: bash
        run: |
          echo "pnpm $(pnpm --version) on node $(node --version)"
          set +e
          pnpm install --frozen-lockfile --ignore-scripts 2>&1 | tee /tmp/install.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo "::error::install failed (exit $code) pnpm=$(pnpm --version): $(tail -c 1500 /tmp/install.log | tr '\n' ' ')"
          fi
          exit "$code"

      - name: Typecheck (and build)
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Validate example project
        run: >-
          node packages/cli/dist/index.js validate
          --schema examples/basic/docs.schema.yaml
          --root examples/basic
          --content examples/basic/docs
