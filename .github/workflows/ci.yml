name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      # pnpm 11 requires node:sqlite, which needs Node >= 22.5 (stable in 24).
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        # --ignore-scripts skips dependency build scripts (esbuild's postinstall),
        # which CI doesn't need; pnpm otherwise errors on unapproved builds.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck (and build)
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Validate example project
        run: >-
          node packages/cli/dist/index.js validate
          --schema examples/basic/docs.schema.yaml
          --root examples/basic
          --content examples/basic/docs
