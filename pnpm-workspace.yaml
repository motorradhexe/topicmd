packages:
  - 'packages/*'
  - 'examples/*'
allowBuilds:
  # Native deps of @vscode/vsce that are only needed for *publishing* (signing
  # and OS credential storage). We package the .vsix but do not publish from
  # here, so their build scripts are skipped.
  '@vscode/vsce-sign': false
  esbuild: true
  keytar: false
